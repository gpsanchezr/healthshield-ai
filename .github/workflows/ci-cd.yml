name: HealthShield AI - CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: healthshield_test
          POSTGRES_USER: healthshield
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Run flake8
      run: |
        pip install flake8
        flake8 backend/apps/ --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Run migrations
      env:
        DATABASE_URL: postgresql://healthshield:test_password@localhost:5432/healthshield_test
        SECRET_KEY: test-secret-key
      run: |
        cd backend
        python manage.py migrate

    - name: Run tests
      env:
        DATABASE_URL: postgresql://healthshield:test_password@localhost:5432/healthshield_test
        SECRET_KEY: test-secret-key
      run: |
        cd backend
        python manage.py test --parallel

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./docker/Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/healthshield-ai:latest,${{ secrets.DOCKER_USERNAME }}/healthshield-ai:${{ github.sha }}

  docs:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build documentation
      run: |
        echo "✓ Documentation verified"
        ls -la docs/

    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs

version: '3.9'

services:
  # ─── Base de datos ───────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       healthshield_db
      POSTGRES_USER:     healthshield
      POSTGRES_PASSWORD: ${DB_PASSWORD:-securepassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthshield"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Backend Django ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: >
      sh -c "python backend/manage.py migrate &&
             python backend/manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    environment:
      DATABASE_URL: postgresql://healthshield:${DB_PASSWORD:-securepassword}@db:5432/healthshield_db
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      DEBUG: ${DEBUG:-False}
      DJANGO_SETTINGS_MODULE: config.settings.production
      ML_MODELS_PATH: /app/ml_models/
      ETL_BATCH_SIZE: "500"
      ETL_MAX_WORKERS: "4"
    volumes:
      - ./backend:/app/backend:ro
      - ./frontend:/app/frontend:ro
      - ml_models:/app/ml_models
      - staticfiles:/app/backend/staticfiles
      - media_files:/app/backend/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ─── Nginx ───────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/app/static:ro
      - media_files:/app/media:ro
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ─── Redis (opcional para tareas async) ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  ml_models:
  staticfiles:
  media_files:
  redis_data: